version: 2

project_name: mnemox

before:
  hooks:
    - sh -c "cd web && npm ci && npm run build"

builds:
  - id: mnemox
    main: ./cmd/mnemox
    binary: mnemox
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - docs/BACKLOG.md

checksum:
  name_template: checksums.txt

signs:
  - artifacts: checksum
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
