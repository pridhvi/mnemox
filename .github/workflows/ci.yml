name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npx playwright install --with-deps chromium
        working-directory: web
      - run: npm run e2e
        working-directory: web
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=sign,publish

  platform-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
      - run: go test ./...
      - name: CLI temp-vault smoke
        run: |
          set -euo pipefail
          ext=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            ext=".exe"
          fi
          mkdir -p bin
          go build -o "bin/mnemox${ext}" ./cmd/mnemox
          tmp="$(mktemp -d)"
          passfile="${tmp}/passphrase"
          vault="${tmp}/.mnemox"
          evidence="${tmp}/proof.txt"
          printf 'test-passphrase\n' > "$passfile"
          printf 'Jenkins dashboard visible without authentication\n' > "$evidence"
          "./bin/mnemox${ext}" --vault "$vault" --passphrase-file "$passfile" init --name "CI Smoke"
          "./bin/mnemox${ext}" --vault "$vault" --passphrase-file "$passfile" asset add ci.acme.local --type host --value 10.0.0.10
          "./bin/mnemox${ext}" --vault "$vault" --passphrase-file "$passfile" finding add "Jenkins anonymous read" --summary "Jenkins allowed unauthenticated read access." --affected-scope ci.acme.local
          "./bin/mnemox${ext}" --vault "$vault" --passphrase-file "$passfile" evidence add "$evidence" --finding "Jenkins anonymous read" --caption "Dashboard visible without authentication"
          "./bin/mnemox${ext}" --vault "$vault" --passphrase-file "$passfile" packet build "Jenkins anonymous read" | grep -q "Dashboard visible without authentication"
