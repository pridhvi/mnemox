name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  published-linux-artifact-smoke:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
      CHECKSUM_CERT_ID: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: Download published release artifacts
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mkdir -p artifact-smoke
          gh release download "$TAG" \
            --repo "$REPO" \
            --pattern checksums.txt \
            --pattern checksums.txt.sigstore.json \
            --pattern "mnemox_${version}_linux_amd64.tar.gz" \
            --dir artifact-smoke
      - name: Verify checksum and signature
        working-directory: artifact-smoke
        run: |
          set -euo pipefail
          version="${TAG#v}"
          sha256sum -c checksums.txt --ignore-missing
          cosign verify-blob checksums.txt \
            --bundle checksums.txt.sigstore.json \
            --certificate-identity "$CHECKSUM_CERT_ID" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          tar -xzf "mnemox_${version}_linux_amd64.tar.gz"
          chmod +x mnemox
      - name: Run published binary temp-vault smoke
        working-directory: artifact-smoke
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          passfile="$work/passphrase"
          vault="$work/vault"
          evidence="$work/jenkins-dashboard.txt"
          packet="$work/packet.md"

          printf 'release-artifact-smoke-passphrase\n' > "$passfile"
          printf 'Jenkins dashboard visible without authentication\n' > "$evidence"

          ./mnemox --vault "$vault" --passphrase-file "$passfile" init --name "Release Artifact Smoke"
          ./mnemox --vault "$vault" --passphrase-file "$passfile" \
            asset add ci.acme.local --type host --value 10.0.0.10
          ./mnemox --vault "$vault" --passphrase-file "$passfile" \
            finding add "Jenkins anonymous read" \
            --severity Medium \
            --summary "Jenkins allowed unauthenticated read access." \
            --affected-scope ci.acme.local \
            --asset ci.acme.local
          ./mnemox --vault "$vault" --passphrase-file "$passfile" \
            note "Build history was visible." \
            --finding "Jenkins anonymous read" \
            --asset ci.acme.local
          ./mnemox --vault "$vault" --passphrase-file "$passfile" \
            evidence add "$evidence" \
            --finding "Jenkins anonymous read" \
            --caption "Dashboard visible without authentication"
          ./mnemox --vault "$vault" --passphrase-file "$passfile" \
            cred add svc_jenkins \
            --username svc_jenkins \
            --secret release-artifact-smoke-secret \
            --asset ci.acme.local
          ./mnemox --vault "$vault" --passphrase-file "$passfile" \
            packet bundle "Jenkins anonymous read" \
            --asset ci.acme.local \
            --output "$packet"
          ./mnemox --vault "$vault" --passphrase-file "$passfile" \
            backup create "$work/smoke.mnemoxbak"

          grep -q '## Cited Assets' "$packet"
          grep -q 'ci.acme.local' "$packet"
          grep -q 'Build history was visible' "$packet"
          grep -q 'Dashboard visible without authentication' "$packet"
          test -s "$work/smoke.mnemoxbak"
          if grep -q 'release-artifact-smoke-secret' "$packet"; then
            echo 'credential secret leaked into packet output' >&2
            exit 1
          fi

  published-windows-artifact-smoke:
    needs: goreleaser
    runs-on: windows-2025-vs2026
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
    steps:
      - name: Download published Windows release artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:TAG.TrimStart('v')
          New-Item -ItemType Directory -Path artifact-smoke -Force | Out-Null
          gh release download $env:TAG `
            --repo $env:REPO `
            --pattern checksums.txt `
            --pattern "mnemox_${version}_windows_amd64.zip" `
            --dir artifact-smoke
      - name: Verify checksum and extract
        working-directory: artifact-smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:TAG.TrimStart('v')
          $archive = "mnemox_${version}_windows_amd64.zip"
          $expectedLine = Get-Content checksums.txt | Where-Object { $_.Trim().EndsWith(" $archive") }
          if (-not $expectedLine) {
            throw "checksum entry not found for $archive"
          }
          $expected = ($expectedLine -split '\s+')[0].ToLowerInvariant()
          $actual = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "checksum mismatch for $archive`: expected $expected, got $actual"
          }
          Expand-Archive -Path $archive -DestinationPath . -Force
          if (-not (Test-Path .\mnemox.exe)) {
            throw 'mnemox.exe missing from Windows archive'
          }
      - name: Run published Windows binary temp-vault smoke
        working-directory: artifact-smoke
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $work = Join-Path $env:RUNNER_TEMP ([Guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $work -Force | Out-Null
          try {
            $passfile = Join-Path $work 'passphrase'
            $vault = Join-Path $work 'vault'
            $evidence = Join-Path $work 'jenkins-dashboard.txt'
            $packet = Join-Path $work 'packet.md'
            $backup = Join-Path $work 'smoke.mnemoxbak'

            [IO.File]::WriteAllText($passfile, "release-artifact-smoke-passphrase`n")
            [IO.File]::WriteAllText($evidence, "Jenkins dashboard visible without authentication`n")

            .\mnemox.exe --vault $vault --passphrase-file $passfile init --name "Release Artifact Smoke"
            .\mnemox.exe --vault $vault --passphrase-file $passfile `
              asset add ci.acme.local --type host --value 10.0.0.10
            .\mnemox.exe --vault $vault --passphrase-file $passfile `
              finding add "Jenkins anonymous read" `
              --severity Medium `
              --summary "Jenkins allowed unauthenticated read access." `
              --affected-scope ci.acme.local `
              --asset ci.acme.local
            .\mnemox.exe --vault $vault --passphrase-file $passfile `
              note "Build history was visible." `
              --finding "Jenkins anonymous read" `
              --asset ci.acme.local
            .\mnemox.exe --vault $vault --passphrase-file $passfile `
              evidence add $evidence `
              --finding "Jenkins anonymous read" `
              --caption "Dashboard visible without authentication"
            .\mnemox.exe --vault $vault --passphrase-file $passfile `
              cred add svc_jenkins `
              --username svc_jenkins `
              --secret release-artifact-smoke-secret `
              --asset ci.acme.local
            .\mnemox.exe --vault $vault --passphrase-file $passfile `
              packet bundle "Jenkins anonymous read" `
              --asset ci.acme.local `
              --output $packet
            .\mnemox.exe --vault $vault --passphrase-file $passfile `
              backup create $backup

            $packetText = Get-Content -Raw $packet
            foreach ($needle in @(
              '## Cited Assets',
              'ci.acme.local',
              'Build history was visible',
              'Dashboard visible without authentication'
            )) {
              if (-not $packetText.Contains($needle)) {
                throw "missing packet text: $needle"
              }
            }
            if ($packetText.Contains('release-artifact-smoke-secret')) {
              throw 'credential secret leaked into packet output'
            }
            if (-not (Test-Path $backup) -or (Get-Item $backup).Length -le 0) {
              throw 'backup file was not created'
            }
          } finally {
            Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
          }
